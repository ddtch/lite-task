name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Compile binaries
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Compile all targets
        working-directory: task-light
        run: |
          mkdir -p dist
          deno compile -A --target x86_64-unknown-linux-gnu  --output dist/lite-task-mcp-linux-x64        mcp/http-client.ts
          deno compile -A --target aarch64-unknown-linux-gnu --output dist/lite-task-mcp-linux-arm64      mcp/http-client.ts
          deno compile -A --target x86_64-apple-darwin       --output dist/lite-task-mcp-macos-x64        mcp/http-client.ts
          deno compile -A --target aarch64-apple-darwin      --output dist/lite-task-mcp-macos-arm64      mcp/http-client.ts
          deno compile -A --target x86_64-pc-windows-msvc   --output dist/lite-task-mcp-windows-x64.exe  mcp/http-client.ts

      - name: Generate checksums
        working-directory: task-light/dist
        run: sha256sum * > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            task-light/dist/lite-task-mcp-linux-x64
            task-light/dist/lite-task-mcp-linux-arm64
            task-light/dist/lite-task-mcp-macos-x64
            task-light/dist/lite-task-mcp-macos-arm64
            task-light/dist/lite-task-mcp-windows-x64.exe
            task-light/dist/checksums.txt
          generate_release_notes: true
